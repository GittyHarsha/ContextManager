title: ContextManager
description: "Persistent AI Project Memory for VS Code - Knowledge Cards, Project Intelligence, BM25 Search & More"
url: "https://gittyharsha.github.io"
baseurl: "/ContextManager"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

logo: "/assets/images/logo.svg"

permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/GittyHarsha/ContextManager"
  "VS Code Marketplace":
    - "https://marketplace.visualstudio.com/items?itemName=HarshaNarayanaP.context-manager"

aux_links_new_tab: true

nav_sort: case_insensitive

heading_anchors: true

# Footer
footer_content: "Copyright &copy; 2026 Harsha Narayana P. Distributed under the <a href=\"https://opensource.org/licenses/MIT\">MIT License</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

exclude:
  - node_modules/
  - out/
  - "*.vsix"
  - Gemfile.lock
